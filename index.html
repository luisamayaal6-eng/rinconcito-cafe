body{font-family:system-ui,-apple-system,sans-serif;background:#FBF7F2;color:#1A1A1A}

.btn{border:none;border-radius:8px;padding:9px 13px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px;color:#fff;background:#2C1810}

.bdg{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600}
.pb{background:#fff;color:#1A1A1A;border:1.5px solid #E5DDD5;border-radius:9px;padding:8px 7px;text-align:left;cursor:pointer;width:100%}
.pb.act{background:#C9956B;color:#fff;border-color:#C9956B}
.pin-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:18px;padding:24px}
.pin-grid{display:grid;grid-template-columns:repeat(3,72px);gap:10px}
.pin-btn{height:58px;border-radius:12px;border:none;font-size:20px;font-weight:600;background:#fff;color:#1A1A1A;cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,.1)}
.pin-btn.del{background:#F0EBE3}
.pin-dots{display:flex;gap:10px}
.dot{width:14px;height:14px;border-radius:50%;background:#E5DDD5;transition:background .15s}
.dot.filled{background:#C9956B}
.cats{display:flex;gap:6px;overflow-x:auto;margin-bottom:8px;padding-bottom:6px;scrollbar-width:thin;scrollbar-color:#C9956B #F0EBE3}
.cats::-webkit-scrollbar{height:4px}
.cats::-webkit-scrollbar-track{background:#F0EBE3;border-radius:4px}
.cats::-webkit-scrollbar-thumb{background:#C9956B;border-radius:4px}
.cats-wrap{position:relative;margin-bottom:8px}
.cats-wrap .cats{margin-bottom:0;padding-bottom:4px}
.cat-btn{padding:5px 11px;border-radius:20px;border:none;background:#F0EBE3;color:#1A1A1A;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;flex-shrink:0}
.cat-btn.act{background:#2C1810;color:#fff}
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.mesa-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mesa-card{background:#fff;border:2px solid #C9956B;border-radius:12px;padding:12px 10px;cursor:pointer;text-align:left;width:100%}
.lbl{font-size:11px;font-weight:600;color:#7A6A5A;margin-bottom:3px;display:block}
.loading{display:flex;align-items:center;justify-content:center;height:100vh;font-size:18px;color:#2C1810}
.err{padding:10px;border-radius:8px;background:#C0392B;color:#fff;font-size:12px;font-weight:600;margin-top:8px}
.ok{padding:10px;border-radius:8px;background:#2E7D52;color:#fff;font-size:12px;font-weight:600;margin-top:8px}
@media print{
  body *{visibility:hidden}

  .ticket-copy:last-child{page-break-after:auto}
  #app,#app *{max-width:none !important}
}
@page{size:80mm auto;margin:0}

// ── Storage: localStorage + Firebase sync ────────────────────
const FIREBASE_URL = window.FIREBASE_URL || "";
const FIREBASE_SECRET = window.FIREBASE_SECRET || "";

async function fbGet(path){
  if(!FIREBASE_URL)return null;
  try{
    const r=await fetch(`${FIREBASE_URL}/${path}.json${FIREBASE_SECRET?`?auth=${FIREBASE_SECRET}`:""}`);
    return r.ok?(await r.json()):null;
  }catch{return null;}
}
async function fbSet(path,val){
  if(!FIREBASE_URL)return;
  try{
    await fetch(`${FIREBASE_URL}/${path}.json${FIREBASE_SECRET?`?auth=${FIREBASE_SECRET}`:""}`,
      {method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(val)});
  }catch{}
}
async function fbDel(path){
  if(!FIREBASE_URL)return;
  try{
    await fetch(`${FIREBASE_URL}/${path}.json${FIREBASE_SECRET?`?auth=${FIREBASE_SECRET}`:""}`,
      {method:"DELETE"});
  }catch{}
}

const FB_URL="https://rinconcito-cafe-default-rtdb.firebaseio.com";
const r2=n=>Math.round(n*100)/100;
const norm=s=>(s||"").toString().trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," ");
const fmt=n=>n==null?"—":"$"+Number(n).toFixed(2);
const uid=()=>Date.now()+"-"+Math.random().toString(36).slice(2,7);
const TODAY=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const sk=(s,t)=>"cafe-"+s.replace(/\s/g,"-")+"-"+t;

async function fbGet(path){
  try{
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),3000);
    const r=await fetch(FB_URL+"/"+path+".json",{signal:ctrl.signal});
    clearTimeout(timer);
    return r.ok?await r.json():null;
  }catch{return null;}
}
async function fbSet(path,val){
  try{await fetch(FB_URL+"/"+path+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(val)});}catch{}
}
async function ST_get(k,d){
  try{
    const fbVal=await fbGet(k.replace(/[.$#[\]/]/g,"-"));
    if(fbVal!==null&&fbVal!==undefined)return fbVal;
    const v=localStorage.getItem(k);return v?JSON.parse(v):d;
  }catch{return d;}
}
async function ST_set(k,v){
  try{localStorage.setItem(k,JSON.stringify(v));await fbSet(k.replace(/[.$#[\]/]/g,"-"),v);}catch{}
}

async function loadSucData(){
  const s=S.suc;
  const isSDM=s==="Salvador del Mundo";
  let [ventas,mesas,ingresos,mermas,recCustom,cancelaciones,recDeleted,eventos]=await Promise.all([
    ST_get(sk(s,"ventas"),[]),ST_get(sk(s,"mesas"),[]),
    ST_get(sk(s,"ingresos"),[]),ST_get(sk(s,"mermas"),[]),
    ST_get(sk(s,"recetas_custom"),isSDM?SDM_REC_CUSTOM_DEFAULT:[]),ST_get(sk(s,"cancelaciones"),[]),
    ST_get(sk(s,"recetas_deleted"),isSDM?SDM_REC_DELETED_DEFAULT:[]),ST_get(sk(s,"eventos"),[])
  ]);
  // Sanitize loaded data - ensure all arrays are valid
  S.ventas=Array.isArray(ventas)?ventas:[];
  S.mesas=Array.isArray(mesas)?mesas.map(m=>({...m,items:Array.isArray(m.items)?m.items:[]})):[];
  S.ingresos=Array.isArray(ingresos)?ingresos:[];
  S.mermas=Array.isArray(mermas)?mermas:[];
  S.recCustom=Array.isArray(recCustom)?recCustom:[];
  S.cancelaciones=Array.isArray(cancelaciones)?cancelaciones:[];
  S.recDeleted=Array.isArray(recDeleted)?recDeleted:[];
  S.eventos=Array.isArray(eventos)?eventos:[];
  const def=s==="Salvador del Mundo"?window.MENU_SDM:window.MENU_CAP;
  const storedInv=await ST_get(sk(s,"inv_base"),null);
  const savedMenu=await ST_get(sk(s,"menu"),[]);
  if(!savedMenu||!savedMenu.length){
    S.menu=def;
  } else {
    const baseIds=new Set(def.map(m=>m.id));
    const savedPrices={};savedMenu.forEach(m=>{if(baseIds.has(m.id))savedPrices[m.id]=m.p;});
    const customItems=savedMenu.filter(m=>!baseIds.has(m.id));
    S.menu=[...def.map(m=>savedPrices[m.id]!==undefined?{...m,p:savedPrices[m.id]}:m),...customItems];
  }
  if(storedInv)S.invBase=storedInv;
  else S.invBase=(INV_BASE[s]||INV_BASE["Salvador del Mundo"]).map(i=>({...i}));

  if(isSDM){
    // ── Auto-reparable: garantiza que las reglas de SDM se aplican aunque
    // Firebase ya tenga datos guardados de antes de que existieran estas reglas.
    let recChanged=false;
    const delKeys=new Set(S.recDeleted.map(d=>d.p+"|"+d.i));
    SDM_REC_DELETED_DEFAULT.forEach(req=>{
      const k=req.p+"|"+req.i;
      if(!delKeys.has(k)){S.recDeleted.push(req);delKeys.add(k);recChanged=true;}
    });
    const beforeCustomLen=S.recCustom.length;
    S.recCustom=S.recCustom.filter(c=>norm(c.i)!=="lechuga"); // Lechuga ya no aplica en SDM
    if(S.recCustom.length!==beforeCustomLen)recChanged=true;
    const customKeys=new Set(S.recCustom.map(c=>c.p+"|"+c.i));
    SDM_REC_CUSTOM_DEFAULT.forEach(req=>{
      const k=req.p+"|"+req.i;
      // Only re-add if not already in recCustom AND not intentionally deleted by the user
      if(!customKeys.has(k)&&!delKeys.has(k)){S.recCustom.push(req);customKeys.add(k);recChanged=true;}
    });
    if(recChanged){
      ST_set(sk(s,"recetas_deleted"),S.recDeleted);
      ST_set(sk(s,"recetas_custom"),S.recCustom);
    }
    // ── Inventario: eliminar ítems confirmados + renombrar ──────────────────
    const removeSet=new Set(SDM_INV_REMOVE.map(norm));
    const renameMap={"bola de sorbete":"Sorbete","cheese cake de chocolate":"Cheese Cake De Nutella",
      "cup de taro":"Taro","cup de horchata":"Horchata","cheese cake de frambuesa":"Cheese Cake De Blueberry",
      "te infusiones":"Te Infusion","cup chai":"Chai","cup de matcha":"Matcha"};
    let invChanged=false;
    const filteredInv=S.invBase.filter(it=>!removeSet.has(norm(it.n)));
    if(filteredInv.length!==S.invBase.length)invChanged=true;
    const renamedInv=filteredInv.map(it=>{
      const newName=renameMap[norm(it.n)];
      if(newName&&newName!==it.n){invChanged=true;return{...it,n:newName};}
      return it;
    });
    if(invChanged){S.invBase=renamedInv;saveInv();}
  } else if(s==="Capistrano"){
    // ── Auto-reparable: garantiza que las reglas de Capistrano se aplican aunque
    // Firebase ya tenga datos guardados de antes de que existieran estas reglas.
    let recChanged=false;
    const delKeys=new Set(S.recDeleted.map(d=>d.p+"|"+d.i));
    CAP_REC_DELETED_DEFAULT.forEach(req=>{
      const k=req.p+"|"+req.i;
      if(!delKeys.has(k)){S.recDeleted.push(req);delKeys.add(k);recChanged=true;}
    });
    const customKeys=new Set(S.recCustom.map(c=>c.p+"|"+c.i));
    CAP_REC_CUSTOM_DEFAULT.forEach(req=>{
      const k=req.p+"|"+req.i;
      // Only re-add if not already in recCustom AND not intentionally deleted by the user
      if(!customKeys.has(k)&&!delKeys.has(k)){S.recCustom.push(req);customKeys.add(k);recChanged=true;}
    });
    if(recChanged){
      ST_set(sk(s,"recetas_deleted"),S.recDeleted);
      ST_set(sk(s,"recetas_custom"),S.recCustom);
    }
    // ── Inventario: eliminar ítems confirmados (por nombre, y casos exactos) ──
    const removeSetCap=new Set(CAP_INV_REMOVE.map(norm));
    // Antes de filtrar, capturamos el stock de "café especialidad" para sumarlo al sobreviviente
    const cafeEspecialidadStock=(S.invBase.find(it=>it.n==="café especialidad")||{}).s||0;
    let invChangedCap=false;
    let filteredCap=S.invBase.filter(it=>{
      if(removeSetCap.has(norm(it.n))){invChangedCap=true;return false;}
      const exactMatch=CAP_INV_REMOVE_EXACT.some(r=>it.n===r.n&&(r.u===undefined||it.u===r.u));
      if(exactMatch){invChangedCap=true;return false;}
      return true;
    });
    if(cafeEspecialidadStock>0){
      filteredCap=filteredCap.map(it=>{
        if(it.n==="Café Especialidad"&&it.s<cafeEspecialidadStock){invChangedCap=true;return{...it,s:cafeEspecialidadStock};}
        return it;
      });
    }
    // Pasta De Pollo: convertir unidad de OZ a UNIDAD (3 OZ = 1 UNIDAD), conservando el stock equivalente
    filteredCap=filteredCap.map(it=>{
      if(it.n==="Pasta De Pollo"&&it.u==="OZ"){
        invChangedCap=true;
        return{...it,u:"UNIDAD",s:r2(it.s/3)};
      }
      return it;
    });
    if(invChangedCap){S.invBase=filteredCap;saveInv();}
  }
}

function renderPin(){
  const isSetup=S.auth==="pin";
  const step=S.pinStep;
  const cur=S.pinCur;
  const dots=[0,1,2,3].map(i=>`<div class="dot${cur.length>i?" filled":""}"></div>`).join("");
  const title=isSetup?(step===0?"Crear PIN de 4 dígitos":"Confirmar PIN"):"Ingresá el PIN";
  const keys=["1","2","3","4","5","6","7","8","9","","0","⌫"];
  const kHTML=keys.map(k=>k===""?"<div></div>":`<button class="pin-btn${k==="⌫"?" del":""}" onclick="pinKey('${k}')">${k}</button>`).join("");
  el("app").innerHTML=`<div class="pin-wrap">
    <div style="font-size:32px">🔒</div>
    <div style="font-size:17px;font-weight:700;color:#2C1810">${title}</div>
    ${isSetup&&step===0?`<div style="font-size:12px;color:#7A6A5A;text-align:center">Este PIN protege el acceso al sistema</div>`:""}
    <div class="pin-dots">${dots}</div>
    ${S.pinErr?`<div style="color:#C0392B;font-size:13px;font-weight:600">${S.pinErr}</div>`:""}
    <div class="pin-grid">${kHTML}</div>
  </div>`;
  // Enable physical keyboard number keys for PIN entry
  if(!window._pinKeyHandler){
    window._pinKeyHandler=(e)=>{
      if(S.auth!=="pin"&&S.auth!=="lock")return;
      if(e.key>="0"&&e.key<="9")pinKey(e.key);
      else if(e.key==="Backspace")pinKey("⌫");
      else if(e.key==="Escape"){S.pinCur="";S.pinErr="";renderPin();}
    };
    document.addEventListener("keydown",window._pinKeyHandler);
  }
}
function pinKey(k){
  if(k==="⌫"){S.pinCur=S.pinCur.slice(0,-1);S.pinErr="";}
  else{
    const np=S.pinCur+k;
    if(S.auth==="pin"){
      if(S.pinStep===0){
        S.pinCur=np;
        if(np.length===4){S.pinConf=np;S.pinCur="";S.pinStep=1;}
      }else{
        S.pinCur=np;
        if(np.length===4){
          if(np===S.pinConf){ST_set("cafe-pin",np);S.auth="suc";S.pinCur="";S.pinStep=0;render();}
          else{S.pinErr="PINs no coinciden";S.pinCur="";S.pinStep=0;S.pinConf="";}
        }
      }
    }else if(S.auth==="lock"){
      S.pinCur=np;
      if(np.length===4){
        Promise.all([ST_get("cafe-pin",null),ST_get("cafe-owner-pin","9999")]).then(([emp,own])=>{
          const ownerPin=own||"9999";
          // Emergency code always grants owner access (hardcoded rescue)
          if(np==="5566"||np===ownerPin){
            if(np==="5566")ST_set("cafe-owner-pin","9999"); // auto-reset to 9999 when emergency is used
            S.pinCur="";S.auth="owner";render();
          }
          else if(np===emp){S.pinCur="";S.auth="ok";render();}
          else{S.pinErr="PIN incorrecto";S.pinCur="";}
          if(S.pinErr) renderPin();
        });
        return;
      }
    }
  }
  if(S.auth==="pin"||S.auth==="lock") renderPin();
}

// ── Main Render ────────────────────────────────────────────
function render(){
  try{
    if(S.auth===null){el("app").innerHTML=`<div class="loading">☕ Cargando...</div>`;return;}
    if(S.auth==="pin"||S.auth==="lock"){renderPin();return;}
    if(S.auth==="owner"){renderOwner();return;}
    if(S.auth==="suc"||!S.suc){renderSuc();return;}
    el("app").innerHTML=hdrHTML()+`<div class="sc" id="sc"></div>`+navHTML();
    const sc=el("sc");
    if(S.tab==="pos") renderPOS(sc);
    else if(S.tab==="res") renderRes(sc);
    else if(S.tab==="inv") renderInv(sc);
    else if(S.tab==="menu") renderMenu(sc);
    else if(S.tab==="cfg") renderCfg(sc);
  }catch(e){
    console.error("render error:",e);
    if(el("app")) el("app").innerHTML=`<div class="loading" style="flex-direction:column;gap:12px">
      <div>⚠ Error al cargar</div>
      <div style="font-size:13px;color:#7A6A5A">${e.message}</div>
      <button onclick="location.reload()" class="btn" style="font-size:13px">🔄 Recargar</button>
    </div>`;
  }
}

function addItem(mesaId,prodId){
  const mesa=S.mesas.find(m=>m.id===mesaId);
  const prod=S.menu.find(p=>p.id===prodId);
  if(!mesa||!prod)return;
  const emp=parseFloat(S.cfg.empDesc||50);
  const isSoda=prod.c==="Bebidas Com.";
  const discPct=mesa.tipo==="Venta Empleados"?(isSoda?70:emp):0;
  const sub=r2(prod.p);
  const base=discPct>0?r2(sub*(1-discPct/100)):sub;
  mesa.items.push({id:uid(),name:prod.n,cat:prod.c,precio:prod.p,cant:1,sub,base,prop:0,total:base,tipo:mesa.tipo});
  const idx=S.mesas.findIndex(m=>m.id===mesaId);S.mesas[idx]=mesa;saveMesas();
  renderMesaDetalle(el("sc"));
}
function filtrarProds(val,mesaId){
  S.menuFilt=val;
  const mesa=S.mesas.find(m=>m.id===mesaId);if(!mesa)return;
  const cat=S.menuCat||"Todo";
  const prods=(S.menu||[]).filter(p=>(cat==="Todo"||p.c===cat)&&p.n.toLowerCase().includes(val.toLowerCase()));
  const grid=document.getElementById("prodGrid");if(!grid)return;
  grid.innerHTML=prods.slice(0,40).map(p=>`<button class="pb" onclick="addItem('${mesaId}','${p.id}')">
    <div style="font-size:11px;font-weight:600;line-height:1.3">${p.n}</div>
    <div style="font-size:12px;font-weight:700;margin-top:2px">${fmt(p.p)}</div>
  </button>`).join("")+(prods.length>40?`<div style="font-size:11px;color:#7A6A5A;padding:8px;grid-column:1/-1;text-align:center">+${prods.length-40} más</div>`:"");
}
function setPYPrice(mesaId,itemId,val){
  const mesa=S.mesas.find(m=>m.id===mesaId);if(!mesa)return;
  mesa.items=mesa.items.map(i=>{
    if(i.id!==itemId)return i;
    const precio=parseFloat(val)||0;
    const sub=r2(precio*i.cant);
    return{...i,precio,sub,base:sub,total:sub};
  });
  const idx=S.mesas.findIndex(m=>m.id===mesaId);S.mesas[idx]=mesa;
  saveMesas();renderMesaDetalle(el('sc'));
}
function remItem(mesaId,itemId){
  const mesa=S.mesas.find(m=>m.id===mesaId);
  mesa.items=mesa.items.filter(i=>i.id!==itemId);
  saveMesas();renderMesaDetalle(el("sc"));
}
function chgCant(mesaId,itemId,d){
  const mesa=S.mesas.find(m=>m.id===mesaId);
  const emp=parseFloat(S.cfg.empDesc||50);
  mesa.items=mesa.items.map(i=>{
    if(i.id!==itemId)return i;
    const c=Math.max(1,i.cant+d);
    const sub=r2(i.precio*c);
    const isSoda=i.cat==="Bebidas Com.";
    const discPct=mesa.tipo==="Venta Empleados"?(isSoda?70:emp):0;
    const base=mesa.tipo==="Pedidos Ya"?sub:(discPct>0?r2(sub*(1-discPct/100)):sub);
    return{...i,cant:c,sub,base,prop:0,total:base};
  });
  saveMesas();renderMesaDetalle(el("sc"));
}

function openPago(mesaId){S.showPago=true;S.pagoModo="simple";S.pagoMet="Efectivo";S.pagoPY="";S.pagoEf="";S.pagoTar="";S.pagoTr="";S.selMesa=mesaId;renderMesaDetalle(el("sc"));}

  const tot=r2((mesa.items||[]).reduce((s,i)=>s+(i.total||0),0));
  const propMesa=mesa.tipo==="Ventas"?r2(tot*0.10):0;
  const descM=mesa.tipo==="Pedidos Ya"?(parseFloat(S.pagoPY)||0):0;
  const neto=r2(tot+propMesa-descM);
  const mezcla=r2((parseFloat(S.pagoEf)||0)+(parseFloat(S.pagoTar)||0)+(parseFloat(S.pagoTr)||0));
  const rest=r2(neto-mezcla);
  return `<div class="ov" onclick="closePago(event)"><div class="mo">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-size:16px;font-weight:700">💳 Cobrar — ${mesa.nombre}</div>

        <input id="pagoPYInp" class="inp" style="width:120px" type="text" inputmode="decimal" value="${S.pagoPY}" oninput="S.pagoPY=this.value;renderMesaDetalle(el('sc'))"></div>`:""}
      ${descM>0?`<div style="display:flex;justify-content:space-between;color:#C0392B;margin-top:6px"><span>(-) Descuento</span><span>${fmt(-descM)}</span></div>`:""}
      <div style="display:flex;justify-content:space-between;font-weight:700;font-size:16px;margin-top:8px"><span>TOTAL</span><span style="color:#2E7D52">${fmt(neto)}</span></div>
    </div>
    <div class="ct">Forma de pago</div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <button class="chip${S.pagoModo==="simple"?" act":""}" onclick="S.pagoModo='simple';renderMesaDetalle(el('sc'))">Un método</button>
      <button class="chip${S.pagoModo==="mixto"?" pu":""}" onclick="S.pagoModo='mixto';renderMesaDetalle(el('sc'))">Cuenta mixta</button>
    </div>
    ${S.pagoModo==="simple"?`<div style="display:flex;gap:8px;margin-bottom:12px">
      ${["Efectivo","Tarjeta","Transferencia"].map(m=>`<button class="chip${S.pagoMet===m?" act":""}" onclick="S.pagoMet='${m}';renderMesaDetalle(el('sc'))">${m}</button>`).join("")}
    </div>`:`<div class="card" style="background:#F0EBE3;margin-bottom:12px">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px">
        ${[["Efectivo","pagoEf"],["Tarjeta","pagoTar"],["Transf.","pagoTr"]].map(([l,k])=>`<div><label class="lbl">${l}</label>
          <input id="${k}" class="inp" type="text" inputmode="decimal" placeholder="0.00" value="${S[k]}" oninput="S.${k}=this.value;renderMesaDetalle(el('sc'))"></div>`).join("")}
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:9px;font-weight:600;font-size:13px">
        <span style="color:#7A6A5A">Pendiente:</span>
        <span style="font-weight:700;color:${rest>0.01?"#C0392B":"#2E7D52"}">${fmt(rest)}</span>
      </div>
    </div>`}
    <button class="btn gr" style="width:100%;justify-content:center;padding:12px;margin-top:8px;opacity:${S.pagoModo==="mixto"&&rest>0.01?.5:1}" onclick="confirmarPago('${mesa.id}')">✓ Confirmar cobro</button>

function closePago(e){if(e.target.classList.contains("ov")){S.showPago=false;renderMesaDetalle(el("sc"));}}
function closePago2(){S.showPago=false;renderMesaDetalle(el("sc"));}
function confirmarPago(mesaId){
  const mesa=S.mesas.find(m=>m.id===mesaId);
  const tot=r2((mesa.items||[]).reduce((s,i)=>s+(i.total||0),0));
  const propMesa=mesa.tipo==="Ventas"?r2(tot*0.10):0;
  const descM=mesa.tipo==="Pedidos Ya"?(parseFloat(S.pagoPY)||0):0;
  const neto=r2(tot+propMesa-descM);
  let pagos;
  if(S.pagoModo==="simple")pagos=[{metodo:S.pagoMet,monto:neto}];
  else{pagos=[];
    if(parseFloat(S.pagoEf)>0)pagos.push({metodo:"Efectivo",monto:parseFloat(S.pagoEf)});
    if(parseFloat(S.pagoTar)>0)pagos.push({metodo:"Tarjeta",monto:parseFloat(S.pagoTar)});
    if(parseFloat(S.pagoTr)>0)pagos.push({metodo:"Transferencia",monto:parseFloat(S.pagoTr)});
  }
  const ALL_REC=[...REC.filter(r=>!S.recDeleted.some(d=>d.p===r.p&&d.i===r.i)),...S.recCustom];
  let propAc=0,descAc=0;
  const entries=mesa.items.map((item,idx)=>{
    const fr=tot>0?item.total/tot:1/mesa.items.length;
    const isLast=idx===mesa.items.length-1;
    const propItem=isLast?r2(propMesa-propAc):r2(propMesa*fr);propAc=r2(propAc+propItem);
    const descItem=isLast?r2(descM-descAc):r2(descM*fr);descAc=r2(descAc+descItem);
    const totalItem=r2(item.total+propItem-descItem);
    const itemFr=neto>0?totalItem/neto:1/mesa.items.length;
    // Snapshot ingredient consumption using the recipe ACTIVE right now,
    // so later recipe edits never retroactively change this sale's history.
    const cons={};
    ALL_REC.filter(r=>r.p===item.name).forEach(r=>{
      const k=norm(r.i);
      cons[k]=r2((cons[k]||0)+r.c*(item.cant||1));
    });
    return{id:uid(),mesaId:mesa.id,hora:new Date().toLocaleTimeString("es-SV",{hour:"2-digit",minute:"2-digit"}),fecha:TODAY(),tipo:mesa.tipo,mesa:mesa.nombre,producto:item.name,cat:item.cat||"",
      cantidad:item.cant,precio:item.precio,sub:item.sub||0,prop:propItem,desc:descItem,
      total:totalItem,cons,
      metodo:pagos.length===1?pagos[0].metodo:"Mixto",
      efectivo:r2(pagos.filter(p=>p.metodo==="Efectivo").reduce((s,p)=>s+p.monto,0)*itemFr),
      tarjeta:r2(pagos.filter(p=>p.metodo==="Tarjeta").reduce((s,p)=>s+p.monto,0)*itemFr),
      transferencia:r2(pagos.filter(p=>p.metodo==="Transferencia").reduce((s,p)=>s+p.monto,0)*itemFr)};
  });
  S.ventas.push(...entries);saveVentas();
  S.mesas=S.mesas.map(m=>m.id===mesaId?{...m,estado:"cerrada"}:m);saveMesas();
  S.showPago=false;S.selMesa=null;
  // Store last payment data globally so post-payment print works regardless of special chars
  window._lastPayment={entries,mesa,neto,pagos};
  el("app").innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;padding:24px;background:#FBF7F2">
    <div style="font-size:28px">✓</div>
    <div style="font-size:18px;font-weight:800;color:#2E7D52">${fmt(neto)}</div>
    <div style="font-size:13px;color:#7A6A5A">${mesa.nombre} · ${mesa.tipo}</div>
    <div style="display:flex;gap:10px;margin-top:8px;align-items:center">
      <select class="inp" style="width:90px" onchange="S.ticketCopias=parseInt(this.value)">
        <option value="1">1 copia</option>
        <option value="2">2 copias</option>
        <option value="3">3 copias</option>
      </select>
      <button class="btn" style="background:#1A5276;color:#fff;padding:12px 20px;font-size:14px" onclick="const lp=window._lastPayment;printTicketFromEntries(lp.entries,lp.mesa,lp.neto,lp.pagos,S.ticketCopias||1)">🖨️ Imprimir recibo</button>
    </div>
    <button class="btn mu" style="padding:12px 24px;font-size:14px;margin-top:4px" onclick="render()">← Volver a mesas</button>
  </div>`;
}

function buildTicketHTML(items,mesaNombre,mesaTipo,baseTotal,propMesa,descM,neto,pagos,sucursal,copies){

  const fecha=now.toLocaleDateString("es-SV",{day:"2-digit",month:"2-digit",year:"numeric"});
  const hora=now.toLocaleTimeString("es-SV",{hour:"2-digit",minute:"2-digit"});
  const propReal=mesaTipo==="Ventas"?r2(baseTotal*0.10):0;
  const netoReal=neto||r2(baseTotal+propReal-descM);
  const body=`
    <div style="text-align:center;border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:8px">
      <div style="font-size:16px;font-weight:900;letter-spacing:1px">TICKET DE COBRO</div>
      <div style="font-size:15px;font-weight:800;margin-top:3px">RINCONCITO DEL CAFÉ</div>
      <div style="font-size:13px;font-weight:700;margin-top:2px">${sucursal||""}</div>
    </div>
    <div style="font-size:13px;margin-bottom:3px"><b>Mesa:</b> ${mesaNombre}</div>
    <div style="font-size:13px;margin-bottom:3px"><b>Tipo:</b> ${mesaTipo}</div>
    <div style="font-size:13px;margin-bottom:8px"><b>Fecha:</b> ${fecha} ${hora}</div>
    <table style="width:100%;border-collapse:collapse;margin-bottom:6px">
      <tr style="border-top:2px solid #000;border-bottom:1px solid #000">
        <th style="text-align:left;font-size:12px;padding:3px 0">Cant</th>
        <th style="text-align:left;font-size:12px;padding:3px 0">Descripción</th>
        <th style="text-align:right;font-size:12px;padding:3px 0">Precio</th>
      </tr>
      ${(items||[]).map(i=>`<tr style="border-bottom:1px dashed #aaa">
        <td style="font-size:13px;font-weight:700;padding:4px 0;vertical-align:top">${i.cant||i.cantidad||1}</td>
        <td style="font-size:13px;padding:4px 4px;vertical-align:top">${i.name||i.producto}</td>
        <td style="font-size:13px;font-weight:700;text-align:right;padding:4px 0;vertical-align:top;white-space:nowrap">$${Number(i.total||0).toFixed(2)}</td>
      </tr>`).join("")}
    </table>
    <div style="border-top:1px solid #000;padding-top:6px">
      <div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px">
        <span>Subtotal</span><span><b>$${baseTotal.toFixed(2)}</b></span>
      </div>
      ${propReal>0.005?`<div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px">
        <span>Propina 10%</span><span style="color:#148C7C"><b>+$${propReal.toFixed(2)}</b></span>
      </div>`:""}
      ${descM>0.005?`<div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px">
        <span>Descuento</span><span style="color:#C0392B"><b>-$${descM.toFixed(2)}</b></span>
      </div>`:""}
    </div>
    <div style="border-top:2px solid #000;border-bottom:2px solid #000;padding:7px 0;margin:6px 0;display:flex;justify-content:space-between">
      <span style="font-size:18px;font-weight:900">TOTAL</span>
      <span style="font-size:18px;font-weight:900">$${netoReal.toFixed(2)}</span>
    </div>
    ${(pagos||[]).map(p=>`<div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px">
      <span>${p.metodo}</span><span><b>$${Number(p.monto||0).toFixed(2)}</b></span>
    </div>`).join("")}
    <div style="text-align:center;margin-top:12px;font-size:13px;font-weight:700">¡Gracias por su visita!</div>
    <div style="text-align:center;border-top:1px solid #000;margin-top:8px;padding-top:6px;font-size:12px;font-weight:700;letter-spacing:1px">FIN DE TICKET</div>
    <div style="height:25mm"></div>`;
  let copies_html="";
  for(let i=0;i<(copies||1);i++) copies_html+=`<div class="ticket-copy">${body}</div>`;
  return`<div id="ticketPrint">${copies_html}</div>`;
}
function printTicket(mesaId,copies){
  const mesa=S.mesas.find(m=>m.id===mesaId);if(!mesa)return;
  const items=mesa.items||[];
  const tot=r2(items.reduce((s,i)=>s+(i.total||0),0));
  const propMesa=mesa.tipo==="Ventas"?r2(tot*0.10):0;
  const descM=mesa.tipo==="Pedidos Ya"?(parseFloat(S.pagoPY)||0):0;
  const neto=r2(tot+propMesa-descM);
  // Build pagos from current payment state if modal is open, otherwise just show total
  let pagos=[];
  if(S.pagoModo==="simple"&&S.pagoMet)pagos=[{metodo:S.pagoMet,monto:neto}];
  else if(S.pagoModo==="mixto"){
    if(parseFloat(S.pagoEf)>0)pagos.push({metodo:"Efectivo",monto:parseFloat(S.pagoEf)});
    if(parseFloat(S.pagoTar)>0)pagos.push({metodo:"Tarjeta",monto:parseFloat(S.pagoTar)});
    if(parseFloat(S.pagoTr)>0)pagos.push({metodo:"Transferencia",monto:parseFloat(S.pagoTr)});
  }
  const div=document.createElement("div");
  div.innerHTML=buildTicketHTML(items,mesa.nombre,mesa.tipo,tot,propMesa,descM,neto,pagos,S.suc,copies||S.ticketCopias||1);
  document.body.appendChild(div);
  window.print();
  document.body.removeChild(div);
}
function printTicketFromEntries(entries,mesa,neto,pagos,copies){
  // Show e.sub (base price per item, no tip) so propina appears as separate line
  const items=entries.map(e=>({cant:e.cantidad,name:e.producto,total:e.sub||e.total}));
  const tot=r2(entries.reduce((s,e)=>s+(e.sub||0),0));
  const descM=r2(entries.reduce((s,e)=>s+(e.desc||0),0));
  const div=document.createElement("div");
  div.innerHTML=buildTicketHTML(items,mesa.nombre,mesa.tipo,tot,0,descM,neto,pagos,S.suc,copies||1);
  document.body.appendChild(div);
  window.print();
  document.body.removeChild(div);
}

function importCSV(){
  const input=document.createElement('input');
  input.type='file';input.accept='.csv,text/csv';
  input.onchange=function(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      const text=ev.target.result;
      const lines=text.split(/\r?\n/).filter(l=>l.trim());
      if(lines.length<2){alert('CSV vacío o inválido');return;}
      const header=lines[0].split(',').map(h=>h.trim().replace(/"/g,'').toLowerCase());
      const nIdx=header.findIndex(h=>h.includes('ingrediente')||h==='n'||h==='nombre');
      const sIdx=header.findIndex(h=>h==='ini'||h.includes('stock')||h==='s');
      if(nIdx===-1||sIdx===-1){alert('El CSV debe tener columnas "Ingrediente" e "Ini".\nUsá el CSV exportado y editá la columna Ini.');return;}
      let updated=0,notFound=[];
      for(let i=1;i<lines.length;i++){
        const cols=lines[i].split(',').map(c=>c.trim().replace(/"/g,''));
        const nombre=cols[nIdx];const stock=parseFloat(cols[sIdx]);
        if(!nombre)continue;
        const item=(S.invBase||[]).find(inv=>inv.n.toLowerCase()===nombre.toLowerCase());
        if(item){item.s=isNaN(stock)?item.s:stock;updated++;}
        else notFound.push(nombre);
      }
      saveInv();renderInv(el('sc'));
      let msg='✓ '+updated+' ingredientes actualizados.';
      if(notFound.length>0)msg+='\n\n⚠ No encontrados ('+notFound.length+'):\n'+notFound.slice(0,8).join(', ')+(notFound.length>8?'...':'');
      alert(msg);
    };
    reader.readAsText(file,'UTF-8');
  };
  input.click();
}
window._importCSV=importCSV;
function addInvItem(){
  const n=(el("newInvN")?.value||S.newInvN||"").trim();

  const s=parseFloat(el("newInvS")?.value||S.newInvS)||0;

  if((S.invBase||[]).some(i=>i.n.toLowerCase()===n.toLowerCase())){
    S.newInvMsg="⚠ Ya existe un ítem con ese nombre";renderInv(el("sc"));return;
  }
  S.invBase=S.invBase||[];
  S.invBase.push({n,u,s});

  S.newInvN="";S.newInvS=0;
  S.newInvMsg="✓ "+n+" agregado al inventario";
  setTimeout(()=>{S.newInvMsg="";renderInv(el("sc"));},3000);
  renderInv(el("sc"));
}

function savePrice(id){

  S.menu=S.menu.map(m=>m.id===id?{...m,p:v}:m);
  ST_set(sk(S.suc,"menu"),S.menu);S.menuSel=null;renderMenu(el("sc"));
}
function delProd(id){S.menu=S.menu.filter(m=>m.id!==id);ST_set(sk(S.suc,"menu"),S.menu);S.menuSel=null;renderMenu(el("sc"));}
function addProd(){
  const n=el("newPN")?.value||S.newPN;const p=parseFloat(el("newPP")?.value||S.newPP);
  const c=el("newPC")?.value||S.newPC;
  if(!n.trim()||isNaN(p))return;
  S.menu.push({id:"cu-"+uid(),n:n.trim(),c,p});
  ST_set(sk(S.suc,"menu"),S.menu);S.showNewProd=false;S.newPN="";S.newPP="";renderMenu(el("sc"));
}
function autoFillUnit(nombre){
  if(!nombre)return;
  if(nombre==="__custom__"){renderMenu(el("sc"));return;}
  const item=(S.invBase||[]).find(i=>i.n===nombre);
  if(item){
    S.niU=item.u;
    const sel=el("niU");
    if(sel){
      const exists=Array.from(sel.options).some(o=>o.value===item.u);
      if(!exists){const opt=document.createElement("option");opt.value=item.u;opt.text=item.u;sel.add(opt);}
      sel.value=item.u;
    }
  }
  // No re-render: DOM already updated above, state saved in S.niU
}
function addRec(prodN){
  let ni=el("niN")?.value||S.niN;
  if(ni==="__custom__")ni=el("niNCustom")?.value||S.niNCustom||"";
  const nc=el("niC")?.value||S.niC;
  const nu=el("niU")?.value||S.niU;
  if(!ni.trim()||!nc)return;
  S.recCustom.push({p:prodN,i:ni.trim(),c:parseFloat(nc),u:nu});
  ST_set(sk(S.suc,"recetas_custom"),S.recCustom);
  S.niN="";S.niC="";S.niNCustom="";
  renderMenu(el("sc"));
}
function delRec(prodN,li){
  const activeRec=[...REC.filter(r=>!S.recDeleted.some(d=>d.p===r.p&&d.i===r.i)),...S.recCustom];
  const target=activeRec.filter(r=>r.p===prodN)[li];
  if(!target)return;
  // Always add to recDeleted to prevent self-healing from re-adding it
  const alreadyDeleted=S.recDeleted.some(d=>d.p===target.p&&d.i===target.i);
  if(!alreadyDeleted){
    S.recDeleted.push({p:target.p,i:target.i});
    ST_set(sk(S.suc,"recetas_deleted"),S.recDeleted);
  }
  // If it's a custom entry, also remove it from recCustom
  const isCustom=S.recCustom.some(r=>r.p===target.p&&r.i===target.i);
  if(isCustom){
    S.recCustom=S.recCustom.filter(r=>!(r.p===target.p&&r.i===target.i));
    ST_set(sk(S.suc,"recetas_custom"),S.recCustom);
  }
  renderMenu(el("sc"));
}

function addEvento(){
  const desc=(el('evDesc')?.value||'').trim();
  const ef=parseFloat(el('evEf')?.value)||0;
  const tar=parseFloat(el('evTar')?.value)||0;
  const tr=parseFloat(el('evTr')?.value)||0;
  const total=r2(ef+tar+tr);
  if(!desc){S.cfgMsg3='Ingresá una descripción';renderCfg(el('sc'));return;}
  if(total<=0){S.cfgMsg3='Ingresá al menos un monto';renderCfg(el('sc'));return;}
  const mets=[ef>0?'Efectivo':'',tar>0?'Tarjeta':'',tr>0?'Transferencia':''].filter(Boolean);
  const metodo=mets.length>1?'Mixto ('+mets.join('+')+')':mets[0];
  const entry={id:uid(),fecha:TODAY(),desc,efectivo:ef,tarjeta:tar,transferencia:tr,total,metodo};
  S.eventos=S.eventos||[];S.eventos.push(entry);
  ST_set(sk(S.suc,'eventos'),S.eventos);
  S.cfgMsg3='✓ Evento registrado — $'+total.toFixed(2);
  setTimeout(()=>{S.cfgMsg3='';renderCfg(el('sc'));},4000);
  renderCfg(el('sc'));
  // Show print dialog immediately after registering
  printEventoRecibo(entry);
}
function printEventoRecibo(ev){
  const now=new Date();
  const fecha=now.toLocaleDateString("es-SV",{day:"2-digit",month:"2-digit",year:"numeric"});
  const hora=now.toLocaleTimeString("es-SV",{hour:"2-digit",minute:"2-digit"});
  const line=(a,b)=>`<div style="display:flex;justify-content:space-between;font-size:11px"><span>${a}</span><span>${b}</span></div>`;
  const html=`<div id="ticketPrint"><div class="ticket-copy">
    <div style="text-align:center;font-weight:700;font-size:13px;margin-bottom:2px">Rinconcito del Café</div>
    <div style="text-align:center;font-size:11px;margin-bottom:2px">${S.suc||""}</div>
    <div style="text-align:center;font-size:10px">${fecha} ${hora}</div>
    <div style="border-top:1px dashed #000;margin:5px 0"></div>
    <div style="text-align:center;font-size:11px;font-weight:700;margin:3px 0">🎉 RECIBO DE EVENTO</div>
    <div style="text-align:center;font-size:11px;margin-bottom:4px">${ev.desc}</div>
    <div style="border-top:1px dashed #000;margin:5px 0"></div>
    ${ev.efectivo>0?line("Efectivo","$"+ev.efectivo.toFixed(2)):""}

function importJSON(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!Array.isArray(data)){S.cfgMsg="Error: formato incorrecto";renderCfg(el("sc"));return;}
      const combined=[...S.ventas,...data.filter(v=>!S.ventas.find(x=>x.id===v.id))];
      S.ventas=combined;saveVentas();
      S.cfgMsg="✓ "+data.length+" registros importados ("+combined.length+" total)";
      setTimeout(()=>{S.cfgMsg="";renderCfg(el("sc"));},4000);
      renderCfg(el("sc"));
    }catch{S.cfgMsg="Error al leer el archivo";renderCfg(el("sc"));}
  };
  reader.readAsText(file);input.value="";
}
async function borrarCache(){
  const ALL_REC=[...REC.filter(r=>!S.recDeleted.some(d=>d.p===r.p&&d.i===r.i)),...S.recCustom];
  const consumo={};
  S.ventas.forEach(v=>{
    if(v.cons&&typeof v.cons==="object"){
      Object.entries(v.cons).forEach(([k,amt])=>{consumo[k]=(consumo[k]||0)+(amt||0);});
    } else {
      ALL_REC.filter(r=>r.p===v.producto).forEach(r=>{const k=norm(r.i);consumo[k]=(consumo[k]||0)+r.c*(v.cantidad||1);});
    }
  });
  const ingSum={};S.ingresos.forEach(i=>{const k=norm(i.item);ingSum[k]=(ingSum[k]||0)+i.cant;});
  const merSum={};S.mermas.forEach(m=>{const k=norm(m.item);merSum[k]=(merSum[k]||0)+m.cant;});
  const newInv=(S.invBase||[]).map(item=>{
    const k=norm(item.n);
    const cons=Math.round((consumo[k]||0)*100)/100;
    const ing=Math.round((ingSum[k]||0)*100)/100;
    const mer=Math.round((merSum[k]||0)*100)/100;
    const fin=Math.round((item.s+ing-cons-mer)*100)/100;
    return{...item,s:Math.max(0,fin)};
  });
  const cans=S.cancelaciones||[];
  const totalCan=r2(cans.reduce((s,c)=>s+(c.monto||0),0));
  const totVentas=r2(S.ventas.reduce((s,v)=>s+(v.total||0),0));

    <div style="text-align:center;margin-bottom:16px">
      <div style="font-size:18px;font-weight:800;color:#2C1810">☕ Resumen Semanal</div>
      <div style="font-size:12px;color:#7A6A5A">${S.suc} — ${semana}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
      <div style="background:#F0EBE3;border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:20px;font-weight:800;color:#2E7D52">$${totVentas.toFixed(2)}</div>
        <div style="font-size:10px;color:#7A6A5A">${S.ventas.length} ventas</div>
      </div>
      <div style="background:#F0EBE3;border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:20px;font-weight:800;color:#C0392B">${cans.length}</div>
        <div style="font-size:10px;color:#7A6A5A">Facturas</div>
      </div>
      <div style="background:#F0EBE3;border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:20px;font-weight:800;color:#C0392B">$${totalCan.toFixed(2)}</div>
        <div style="font-size:10px;color:#7A6A5A">$ proveedores</div>
      </div>
    </div>
    ${cans.length>0?`<div style="margin-bottom:14px">
      <div style="font-size:11px;font-weight:700;color:#7A6A5A;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Facturas a Proveedores</div>
      ${cans.map(c=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #F0EBE3;font-size:12px">
        <div><div style="font-weight:500">${c.desc}</div>

async function ownerDelMesa(sucursal,mesaKey){
  const fbKey="cafe-"+sucursal.replace(/\s/g,"-")+"-ventas";
  const allVentas=await fbGet(fbKey)||[];
  const today=S.ownerFecha||TODAY();
  const filtered=allVentas.filter(v=>{
    if(v.fecha!==today)return true;
    const k=v.mesaId||v.mesa||"Sin mesa";
    return k!==mesaKey;
  });
  await fbSet(fbKey,filtered);
  loadOwner();
}

    ${dayData.length===0?`<div style="text-align:center;padding:20px;color:#7A6A5A;font-size:12px">Sin registros para esta fecha</div>`:""}
    ${dayData.map(r=>`
      <div style="background:#fff;border-radius:8px;margin-bottom:8px;overflow:hidden;border:1px solid #E5DDD5">
        ${OE.editing===r.id?ownerEditForm(r):`
        <div style="padding:10px 12px;display:flex;justify-content:space-between;align-items:center">
          <div style="flex:1">
            <div style="font-size:12px;font-weight:600">${ownerRecordTitle(r)}</div>
            <div style="font-size:11px;color:#7A6A5A">${ownerRecordSub(r)}</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <span style="font-weight:700;font-size:13px;color:#2E7D52">$${Number(r.total||r.monto||r.cant||0).toFixed(2)}</span>
            <button onclick="OE.editing='${r.id}';ownerRenderEditor()" style="background:#1A5276;color:#fff;border:none;border-radius:6px;padding:4px 9px;font-size:11px;cursor:pointer">✏️</button>
            <button onclick="ownerDelRecord('${r.id}')" style="background:#C0392B;color:#fff;border:none;border-radius:6px;padding:4px 9px;font-size:11px;cursor:pointer">✕</button>
          </div>
        </div>`}
      </div>`).join("")}
    <button onclick="loadOwner()" style="width:100%;margin-top:8px;padding:10px;background:#F0EBE3;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600">← Volver al resumen</button>
  </div>`;
}

function ownerRecordTitle(r){
  if(OE.type==="ventas") return `${r.cantidad||1}× ${r.producto||""} · ${r.mesa||""}`;
  if(OE.type==="ingresos") return r.item||"Sin descripción";
  if(OE.type==="mermas") return r.item||"Sin descripción";
  if(OE.type==="eventos") return r.desc||"Sin descripción";
  if(OE.type==="cancelaciones") return r.desc||"Sin descripción";
  return r.desc||r.item||r.producto||"";
}
function ownerRecordSub(r){
  const parts=[];
  if(r.metodo)parts.push(r.metodo);
  if(r.hora)parts.push(r.hora);
  if(r.nota)parts.push(r.nota);
  if(r.u)parts.push(r.u);
  return parts.join(" · ")||"";
}

function ownerEditForm(r){
  const isNew=!r;
  const v=(f,d="")=>r?r[f]||d:d;
  const fields={
    ventas:`<div style="display:grid;gap:6px;padding:10px">
      <input class="inp" id="oe_producto" placeholder="Producto" value="${v("producto")}">
      <input class="inp" id="oe_mesa" placeholder="Mesa" value="${v("mesa")}">
      <input class="inp" type="text" inputmode="decimal" id="oe_cantidad" placeholder="Cantidad" value="${v("cantidad",1)}">
      <input class="inp" type="text" inputmode="decimal" id="oe_total" placeholder="Total $" value="${v("total")}">
      <select class="inp" id="oe_metodo"><option ${v("metodo")==="Efectivo"?"selected":""}>Efectivo</option><option ${v("metodo")==="Tarjeta"?"selected":""}>Tarjeta</option><option ${v("metodo")==="Mixto"?"selected":""}>Mixto</option><option ${v("metodo")==="Transferencia"?"selected":""}>Transferencia</option></select>
    </div>`,
    ingresos:`<div style="display:grid;gap:6px;padding:10px">
      <input class="inp" id="oe_item" placeholder="Ingrediente" value="${v("item")}">
      <input class="inp" type="text" inputmode="decimal" id="oe_cant" placeholder="Cantidad" value="${v("cant")}">
      <input class="inp" id="oe_nota" placeholder="Nota (opcional)" value="${v("nota")}">
    </div>`,
    mermas:`<div style="display:grid;gap:6px;padding:10px">
      <input class="inp" id="oe_item" placeholder="Ingrediente" value="${v("item")}">
      <input class="inp" type="text" inputmode="decimal" id="oe_cant" placeholder="Cantidad" value="${v("cant")}">
      <input class="inp" id="oe_mot" placeholder="Motivo" value="${v("mot","Desperdicio")}">
    </div>`,
    eventos:`<div style="display:grid;gap:6px;padding:10px">
      <input class="inp" id="oe_desc" placeholder="Descripción del evento" value="${v("desc")}">
      <input class="inp" type="text" inputmode="decimal" id="oe_ef" placeholder="Efectivo $" value="${v("efectivo",0)}">
      <input class="inp" type="text" inputmode="decimal" id="oe_tar" placeholder="Tarjeta $" value="${v("tarjeta",0)}">
      <input class="inp" type="text" inputmode="decimal" id="oe_tr" placeholder="Transferencia $" value="${v("transferencia",0)}">
    </div>`,
    cancelaciones:`<div style="display:grid;gap:6px;padding:10px">
      <input class="inp" id="oe_desc" placeholder="Descripción" value="${v("desc")}">
      <input class="inp" type="text" inputmode="decimal" id="oe_monto" placeholder="Monto $" value="${v("monto")}">
      <select class="inp" id="oe_metodo"><option ${v("metodo")==="Efectivo"?"selected":""}>Efectivo</option><option ${v("metodo")==="Tarjeta"?"selected":""}>Tarjeta</option><option ${v("metodo")==="Transferencia"?"selected":""}>Transferencia</option></select>
    </div>`,
  };
  return`<div style="background:#FBF7F2;padding:4px">
    ${fields[OE.type]||""}
    <div style="display:flex;gap:8px;padding:0 10px 10px">
      <button onclick="ownerSaveRecord(${isNew?"null":"'"+r.id+"'"})" style="flex:1;padding:8px;background:#2E7D52;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600">✓ Guardar</button>
      <button onclick="OE.editing=null;ownerRenderEditor()" style="padding:8px 14px;background:#E5DDD5;border:none;border-radius:8px;cursor:pointer;font-size:12px">Cancelar</button>
    </div>
  </div>`;
}

function ownerAddRecord(){OE.editing="new";ownerRenderEditor();}

async function ownerSaveRecord(id){
  const fecha=S.ownerFecha||TODAY();
  const g=(elId)=>el(elId)?.value||"";
  let record={id:id||uid(),fecha};
  if(OE.type==="ventas"){
    record={...record,producto:g("oe_producto"),mesa:g("oe_mesa"),
      cantidad:parseFloat(g("oe_cantidad"))||1,total:parseFloat(g("oe_total"))||0,
      metodo:g("oe_metodo"),tipo:record.tipo||"Ventas"};
  }else if(OE.type==="ingresos"){
    record={...record,item:g("oe_item"),cant:parseFloat(g("oe_cant"))||0,nota:g("oe_nota")};
  }else if(OE.type==="mermas"){
    record={...record,item:g("oe_item"),cant:parseFloat(g("oe_cant"))||0,mot:g("oe_mot")||"Desperdicio"};
  }else if(OE.type==="eventos"){
    const ef=parseFloat(g("oe_ef"))||0,tar=parseFloat(g("oe_tar"))||0,tr=parseFloat(g("oe_tr"))||0;
    const mets=[ef>0?"Efectivo":"",tar>0?"Tarjeta":"",tr>0?"Transferencia":""].filter(Boolean);
    record={...record,desc:g("oe_desc"),efectivo:ef,tarjeta:tar,transferencia:tr,
      total:r2(ef+tar+tr),metodo:mets.length>1?"Mixto ("+mets.join("+")+")":mets[0]||""};
  }else if(OE.type==="cancelaciones"){
    record={...record,desc:g("oe_desc"),monto:parseFloat(g("oe_monto"))||0,metodo:g("oe_metodo")};
  }
  if(id){OE.data=OE.data.map(r=>r.id===id?{...r,...record}:r);}
  else{OE.data.push(record);}
  await fbSet(OE.fbKey,OE.data);
  OE.editing=null;ownerRenderEditor();
}

async function ownerDelRecord(id){
  OE.data=OE.data.filter(r=>r.id!==id);
  await fbSet(OE.fbKey,OE.data);
  OE.editing=null;ownerRenderEditor();
}
// ── App Init ───────────────────────────────────────────────
async function init(){
  S.auth=null;render();
  // One-time owner PIN reset: if firebase has a bad value, restore to 9999
  try{const own=await ST_get("cafe-owner-pin",null);if(!own)await ST_set("cafe-owner-pin","9999");}catch{}
  try{
    const[pin,suc,cfg]=await Promise.all([
      ST_get("cafe-pin",null),
      ST_get("cafe-sucursal",null),
      ST_get("cafe-config",{empDesc:50})
    ]);
    S.cfg=cfg;
    if(suc){
      S.suc=suc;
      await loadSucData();
    }
    S.auth=pin?"lock":"pin";
    render();
  }catch(e){
    S.auth="pin";render();
  }
}
init();
</script>
</body>
